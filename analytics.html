<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPL Analytics - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #00a8ff; --orange: #f39c12; --red: #e74c3c; --green: #27ae60; 
            --purple: #8e44ad; --dark: #0b132b; --bg: #f1f5f9;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; display: none; }
        
        /* Top Navigation & Badge */
        .header-top { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; gap: 10px; }
        .back-link { color: var(--dark); text-decoration: none; font-weight: 700; font-size: 14px; background: white; padding: 8px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-transform: uppercase; }
        .tour-badge { background: var(--dark); color: white; padding: 8px 25px; border-radius: 25px; font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 500px; }

        /* 1. TOP CARDS DESIGN */
        .analytics-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; max-width: 1300px; margin: 0 auto 40px auto; 
        }
        
        .ana-card { 
            background: white; border-radius: 20px; text-align: center; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-bottom: 6px solid #ddd;
            transition: transform 0.3s; display: flex; flex-direction: column; justify-content: space-between;
        }
        .ana-card:hover { transform: translateY(-5px); }
        .ana-card h3 { margin: 0; font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 800;}
        .ana-card .val { font-size: 40px; font-weight: 800; margin: 10px 0; color: var(--dark); }
        
        .view-btn { 
            display: block; width: 100%; padding: 12px; border-radius: 10px; border: none;
            color: white; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 11px;
            text-transform: uppercase; transition: 0.3s; margin-top: auto;
        }
        .btn-blue { background: var(--blue); } .btn-blue:hover { background: #0097e6; }
        .btn-orange { background: var(--orange); } .btn-orange:hover { background: #e67e22; }
        .btn-red { background: var(--red); } .btn-red:hover { background: #c0392b; }
        .btn-green { background: var(--green); } .btn-green:hover { background: #219d52; }
        .btn-purple { background: var(--purple); } .btn-purple:hover { background: #732d91; }

        /* 2. TEAM SQUADS SECTION */
        .section-header { text-align: center; margin-bottom: 25px; }
        .section-header h2 { font-size: 22px; font-weight: 900; color: var(--dark); margin: 0; text-transform: uppercase; }
        
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1300px; margin: auto; }
        
        .team-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--dark); }
        .team-card h3 { margin: 0 0 20px 0; font-size: 18px; color: var(--dark); font-weight: 900; text-transform: uppercase; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: #64748b; }
        .row b { color: var(--dark); font-weight: 800; font-size: 15px; }
        .row.red b { color: var(--red); } .row.green b { color: var(--green); }

        /* 3. PROGRESS BAR */
        .progress-container { margin: 20px 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; margin-bottom: 5px; color: var(--dark); text-transform: uppercase; }
        .bar-bg { background: #e2e8f0; height: 10px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--blue); border-radius: 10px; transition: 0.8s ease-out; }

        /* 4. MAX BID BOX */
        .max-bid-box { background: #fff8eb; border: 2px dashed #f39c12; border-radius: 12px; padding: 12px; text-align: center; margin-top: 20px; }
        .max-bid-box span { display: block; font-size: 10px; font-weight: 800; color: #f39c12; text-transform: uppercase; }
        .max-bid-box b { font-size: 20px; color: #b45309; font-weight: 900; }

        .btn-list { display: block; text-align: center; margin-top: 15px; padding: 12px; background: #f1f5f9; color: #475569; text-decoration: none; border-radius: 10px; font-weight: 800; font-size: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-list:hover { background: #e2e8f0; color: var(--dark); }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .analytics-grid { grid-template-columns: 1fr 1fr; } /* 2 column mobile grid */
            .ana-card .val { font-size: 32px; }
            .team-card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="header-top">
        <a href="index.html" class="back-link">🔙 Back to Hub</a>
        <div class="tour-badge" id="activeBadge">
            🏆 Analytics: <span id="badgeName">Checking Data...</span>
        </div>
    </div>

    <div id="mainUI">
        <div class="analytics-grid">
            <div class="ana-card" style="border-bottom-color: var(--blue)">
                <h3>Total Players</h3>
                <div class="val" id="totalCount">0</div>
                <a href="#" id="linkTotal" target="_blank" class="view-btn btn-blue">VIEW ALL LIST</a>
            </div>
            <div class="ana-card" style="border-bottom-color: var(--orange)">
                <h3>Sold Players</h3>
                <div class="val" id="soldCount" style="color: var(--orange)">0</div>
                <a href="#" id="linkSold" target="_blank" class="view-btn btn-orange">VIEW SOLD</a>
            </div>
            <div class="ana-card" style="border-bottom-color: var(--red)">
                <h3>Unsold</h3>
                <div class="val" id="unsoldCount" style="color: var(--red)">0</div>
                <a href="#" id="linkUnsold" target="_blank" class="view-btn btn-red">VIEW UNSOLD</a>
            </div>
            <div class="ana-card" style="border-bottom-color: var(--green)">
                <h3>Available</h3>
                <div class="val" id="availableCount" style="color: var(--green)">0</div>
                <a href="#" id="linkAvailable" target="_blank" class="view-btn btn-green">VIEW AVAILABLE</a>
            </div>
            <div class="ana-card" style="border-bottom-color: var(--purple)">
                <h3>Pending Verify</h3>
                <div class="val" id="pendingVerifyCount" style="color: var(--purple)">0</div>
                <a href="verify_payments.html" target="_blank" class="view-btn btn-purple">VERIFY NOW</a>
            </div>
        </div>

        <div class="section-header">
            <h2 id="squadTitle">👥 Team Squads Overview</h2>
        </div>

        <div id="teamSquads" class="teams-grid"></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- 🔐 STRICT CROSS-TAB SECURITY & ADMIN CHECK ---
    const urlParams = new URLSearchParams(window.location.search);
    let requestedTour = null;
    
    if (urlParams.get('id')) {
        try { requestedTour = atob(urlParams.get('id')); } 
        catch(e) { requestedTour = "INVALID"; }
    }

    function checkSecurity() {
        const authStatus = localStorage.getItem("isLoggedIn");
        const authorizedTour = localStorage.getItem("activeTournamentID");
        if (authStatus !== "true" || !authorizedTour) return false;
        if (requestedTour && requestedTour !== authorizedTour) return false;
        return true;
    }

    if (!checkSecurity()) {
        window.location.replace("login.html");
    } else {
        document.body.style.display = "block"; 
    }

    const activeTour = localStorage.getItem("activeTournamentID");
    const encodedId = btoa(activeTour); 

    window.addEventListener('storage', function(event) {
        if (event.key === 'activeTournamentID' || event.key === 'isLoggedIn') {
            if (!checkSecurity()) window.location.replace("login.html");
        }
    });

    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com",
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Initialize UI
    document.getElementById("badgeName").innerText = activeTour;
    document.getElementById("squadTitle").innerText = `👥 ${activeTour} Squads Overview`;
    
    // Forwarding Encrypted Links to Reports Page
    document.getElementById("linkTotal").href = "reports.html?type=TOTAL&id=" + encodedId;
    document.getElementById("linkSold").href = "reports.html?type=SOLD_ALL&id=" + encodedId;
    document.getElementById("linkUnsold").href = "reports.html?type=UNSOLD&id=" + encodedId;
    document.getElementById("linkAvailable").href = "reports.html?type=AVAILABLE&id=" + encodedId;
    // (Note: Pending links directly to verify_payments.html, handled in HTML)

    loadAnalyticsData();

    function loadAnalyticsData() {
        db.ref("tournaments/" + activeTour).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const config = data.config || {};
            const squadLimit = parseInt(config.squadLimit) || 15;
            const defaultBasePrice = parseInt(config.defaultBasePrice) || 1000;

            const players = data.players || {};
            const teams = data.teams || {};
            const playerArray = Object.values(players);
            const teamArray = Object.values(teams);

            // Calculate Stats for Top Cards
            const sold = playerArray.filter(p => p.status === "sold");
            const unsold = playerArray.filter(p => p.status === "unsold");
            const available = playerArray.filter(p => p.status === "available" && p.paymentStatus !== "pending");
            
            // 🟣 NEW: Count only Pending players
            const pendingVerify = playerArray.filter(p => p.paymentStatus === "pending");

            document.getElementById("totalCount").innerText = playerArray.length;
            document.getElementById("soldCount").innerText = sold.length;
            document.getElementById("unsoldCount").innerText = unsold.length;
            document.getElementById("availableCount").innerText = available.length;
            document.getElementById("pendingVerifyCount").innerText = pendingVerify.length; // Update 5th Card

            // Render Team Cards
            const squadsDiv = document.getElementById("teamSquads");
            squadsDiv.innerHTML = "";
            
            if(teamArray.length === 0) {
                squadsDiv.innerHTML = "<p style='text-align:center; width:100%; color:#94a3b8; font-weight:bold;'>No teams registered yet.</p>";
            }

            teamArray.forEach((t) => {
                const teamSold = sold.filter(p => p.soldTo === t.teamName);
                const squadSize = teamSold.length;
                const balance = parseInt(t.remainingBudget || 0);
                const totalPurse = parseInt(t.totalPurse || 50000);
                const spent = totalPurse - balance;
                
                let maxBid = balance;
                if (squadSize < squadLimit) {
                    const emptySlots = squadLimit - squadSize - 1;
                    maxBid = balance - (emptySlots * defaultBasePrice);
                }
                if(maxBid < 0) maxBid = 0;

                const progressPercent = (squadSize / squadLimit) * 100;
                const squadLink = `reports.html?type=TEAM&name=${encodeURIComponent(t.teamName)}&id=${encodedId}`;

                squadsDiv.innerHTML += `
                    <div class="team-card">
                        <h3>${t.teamName}</h3>
                        <div class="row"><span>Total Purse:</span><b>₹${totalPurse.toLocaleString('en-IN')}</b></div>
                        <div class="row red"><span>Spent:</span><b>₹${spent.toLocaleString('en-IN')}</b></div>
                        <div class="row green"><span>Balance:</span><b>₹${balance.toLocaleString('en-IN')}</b></div>
                        
                        <div class="progress-container">
                            <div class="bar-label"><span>Squad Filled</span><span>${squadSize} / ${squadLimit}</span></div>
                            <div class="bar-bg">
                                <div class="bar-fill" style="width: ${progressPercent}%"></div>
                            </div>
                        </div>

                        <div class="max-bid-box">
                            <span>Current Max Bid Possible</span>
                            <b>₹${maxBid.toLocaleString('en-IN')}</b>
                        </div>

                        <a href="${squadLink}" target="_blank" class="btn-list">📝 View Squad List</a>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
