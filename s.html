<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Setup - Gautam Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3799; --accent: #00d2ff; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .setup-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; border-top: 10px solid var(--primary); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; font-family: inherit; font-weight: 600; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: #f0fbff; }
        
        /* Pin specific style */
        #adminPin { letter-spacing: 5px; font-size: 18px; text-align: center; }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        
        /* Modal Style */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .success-modal { background: white; border-radius: 25px; padding: 30px; width: 100%; max-width: 400px; text-align: center; animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .details-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; margin: 15px 0; text-align: left; }
        .details-box p { margin: 5px 0; font-size: 14px; font-weight: 600; color: #475569; display: flex; justify-content: space-between; }
        .details-box span { color: var(--primary); font-weight: 800; }
        .btn-ok { background: var(--primary); color: white; padding: 12px 40px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="setup-card">
    <h2>🏆 Tournament Setup</h2>
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Full Tournament Name</label>
            <input type="text" id="tourName" placeholder="e.g. Seoni Premier League 2026">
        </div>
        <div class="form-group">
            <label>Short ID (No Space)</label>
            <input type="text" id="shortName" placeholder="e.g. SPL2026">
        </div>
        <div class="form-group">
            <label>Admin Secret PIN (4 Digits)</label>
            <input type="text" id="adminPin" placeholder="0000" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>
        <div class="form-group">
            <label>Team Purse (₹)</label>
            <input type="number" id="totalPurse" value="50000">
        </div>
        <div class="form-group">
            <label>Max Players / Team</label>
            <input type="number" id="squadLimit" value="15">
        </div>
        <div class="form-group full-width">
            <label>Default Base Price (₹)</label>
            <input type="number" id="basePrice" value="1000">
        </div>
        <div class="form-group">
            <label>Registration Fees (₹)</label>
            <input type="number" id="regFees" placeholder="e.g. 301">
        </div>
        <div class="form-group">
            <label>Your UPI ID (For QR)</label>
            <input type="text" id="upiId" placeholder="7999984007@ybl">
        </div>
    </div>

    <button class="btn-save" onclick="saveSetup()">Initialize Tournament 🚀</button>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="success-modal">
        <div style="font-size: 50px;">✅</div>
        <h3>CONGRATULATIONS!</h3>
        <div class="details-box">
            <p>Tournament ID: <span id="mID">--</span></p>
            <p>Admin PIN: <span id="mPIN">--</span></p>
            <p>Reg. Fee: <span id="mFee">--</span></p>
            <p>Purse/Team: <span id="mPurse">--</span></p>
        </div>
        <button class="btn-ok" onclick="goToLogin()">LOGIN TO CONTROL ➜</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com", 
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function saveSetup() {
        const name = document.getElementById("tourName").value.trim();
        const shortName = document.getElementById("shortName").value.trim().toUpperCase();
        const pin = document.getElementById("adminPin").value.trim();
        const purse = document.getElementById("totalPurse").value;
        const squad = document.getElementById("squadLimit").value;
        const base = document.getElementById("basePrice").value;
        const fees = document.getElementById("regFees").value || 0;
        const upi = document.getElementById("upiId").value.trim();

        // 🚨 Strict 4-Digit Pin Check
        if(pin.length !== 4) {
            alert("⚠️ Admin PIN must be exactly 4 digits long!");
            document.getElementById("adminPin").focus();
            return;
        }

        if(!name || !shortName || !upi) {
            alert("⚠️ Please fill all required fields!");
            return;
        }

        try {
            const check = await db.ref("tournaments/" + shortName).once("value");
            if(check.exists()) {
                if(!confirm("⚠️ Short ID already exists! Overwrite?")) return;
            }

            const tourPath = "tournaments/" + shortName;

            await db.ref(tourPath + "/config").set({
                tournamentName: name,
                shortName: shortName,
                adminPin: pin,
                totalPurse: parseInt(purse),
                squadLimit: parseInt(squad),
                defaultBasePrice: parseInt(base),
                regFees: parseInt(fees),
                upiId: upi,
                createdAt: Date.now()
            });

            await db.ref(tourPath + "/live_state").set({ currentPlayer: "", status: "paused" });

            document.getElementById("mID").innerText = shortName;
            document.getElementById("mPIN").innerText = pin;
            document.getElementById("mFee").innerText = "₹" + fees;
            document.getElementById("mPurse").innerText = "₹" + purse;
            document.getElementById("modalOverlay").style.display = "flex";

        } catch (error) {
            alert("❌ Error: " + error.message);
        }
    }

    function goToLogin() {
        localStorage.clear();
        window.location.replace("login.html");
    }
</script>

</body>
</html>
