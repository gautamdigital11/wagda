<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Team Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; background: #f4f7f6; 
            display: none; /* Security: Hidden until verified */
            justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px; flex-direction: column; 
        }
        
        /* Active Tournament Badge */
        .tour-badge { 
            background: #1e3799; color: white; padding: 8px 25px; 
            border-radius: 25px; font-size: 14px; font-weight: bold; 
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); 
            text-align: center; width: 100%; max-width: 450px;
        }

        /* Responsive Card */
        .card { 
            background: white; padding: 30px 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; 
            border-top: 8px solid #1e3799; 
        }
        h2 { color: #1e3799; margin-top: 0; text-align: center; font-size: 20px; text-transform: uppercase; }
        p { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; 
            font-size: 15px; margin-bottom: 15px; outline: none; font-family: inherit; 
            transition: 0.3s;
        }
        input:focus { border-color: #00a8ff; box-shadow: 0 0 8px rgba(0, 168, 255, 0.2); }
        
        .btn { 
            width: 100%; background: #27ae60; color: white; border: none; padding: 15px; 
            font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; 
        }
        .btn:hover { background: #219653; transform: translateY(-2px); }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }

        .team-list { margin-top: 30px; }
        .team-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f8f9fa; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; 
            border-left: 4px solid #1e3799; font-size: 14px; font-weight: 600; 
        }
        .delete-btn { 
            color: #e74c3c; cursor: pointer; font-size: 12px; font-weight: bold; 
            background: #ffeaa7; padding: 5px 10px; border-radius: 5px; transition: 0.3s;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }

        /* Mobile specific adjustments */
        @media (max-width: 400px) {
            .card { padding: 20px 15px; }
            h2 { font-size: 18px; }
            .tour-badge { font-size: 12px; }
            .team-row { font-size: 12px; flex-direction: column; align-items: flex-start; gap: 8px; }
            .delete-btn { align-self: flex-end; }
        }
    </style>
</head>
<body>

<div class="tour-badge" id="activeBadge">
    🏆 Active: <span id="badgeName">Checking Database...</span>
</div>

<div class="card">
    <h2 id="formTitle">➕ TEAM ENTRY</h2>
    <p>टीम का नाम लिखें। बजट और लोगो ऑटो-सेट हो जाएगा।</p>

    <input type="text" id="tName" placeholder="Enter Team Name..." autocomplete="off">
    <button class="btn" id="addBtn" onclick="addTeam()">Add Team</button>

    <div class="team-list">
        <h3 style="font-size: 14px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 5px;" id="listTitle">Recent Teams:</h3>
        <div id="listContainer">
            <div style='font-size:12px; color:#999; text-align:center;'>Loading teams...</div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 25px;">
        <a href="index.html" style="color: #1e3799; font-size: 13px; font-weight: bold; text-decoration: none;">← Back to Dashboard</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- 🔐 STRICT CROSS-TAB SECURITY & DECRYPTION CHECK ---
    const urlParams = new URLSearchParams(window.location.search);
    let requestedTour = null;
    
    if (urlParams.get('id')) {
        try { requestedTour = atob(urlParams.get('id')); } 
        catch(e) { requestedTour = "INVALID"; }
    }

    function checkSecurity() {
        const authStatus = localStorage.getItem("isLoggedIn");
        const authorizedTour = localStorage.getItem("activeTournamentID");
        if (authStatus !== "true" || !authorizedTour) return false;
        if (requestedTour && requestedTour !== authorizedTour) return false;
        return true;
    }

    if (!checkSecurity()) {
        alert("🔒 Unauthorized Access or Session Expired!");
        window.location.replace("login.html");
    } else {
        document.body.style.display = "flex"; // Authorized! Show page
    }

    const activeTour = localStorage.getItem("activeTournamentID");

    // 🚨 CROSS-TAB SYNC (Auto Logout if tab changed)
    window.addEventListener('storage', function(event) {
        if (event.key === 'activeTournamentID' || event.key === 'isLoggedIn') {
            if (!checkSecurity()) {
                alert("⚠️ Security Alert: Active tournament changed in another tab. This tab is now locked.");
                window.location.replace("login.html");
            }
        }
    });

    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com",
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Initialize UI & Load Data
    document.getElementById('badgeName').innerText = activeTour;
    document.getElementById('formTitle').innerText = "➕ " + activeTour + " TEAMS";
    document.getElementById('listTitle').innerText = activeTour + " Teams List:";
    loadTeams();

    // Enter Button Trigger
    document.getElementById("tName").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            addTeam();
        }
    });

    // 3. Add Team Logic
    async function addTeam() {
        const nameInput = document.getElementById("tName");
        const name = nameInput.value.trim();
        const btn = document.getElementById("addBtn");

        if (!name) return alert("कृपया टीम का नाम भरें!");

        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            // Fetch default purse for THIS tournament
            const setupSnap = await db.ref("tournaments/" + activeTour + "/config/totalPurse").once("value");
            let defaultPurse = setupSnap.exists() ? parseInt(setupSnap.val()) : 50000; 

            // Sequence ID Generation (T01, T02...) inside specific tournament
            const teamSnap = await db.ref("tournaments/" + activeTour + "/teams").once("value");
            
            // Find next available ID securely
            let nextNum = 1;
            if(teamSnap.exists()) {
                const existingKeys = Object.keys(teamSnap.val());
                const highest = existingKeys.map(k => parseInt(k.replace('T',''))).filter(n => !isNaN(n)).sort((a,b)=>b-a)[0];
                if(highest) nextNum = highest + 1;
            }
            
            const teamId = "T" + String(nextNum).padStart(2, '0');

            // Set Data
            await db.ref("tournaments/" + activeTour + "/teams/" + teamId).set({
                teamId: teamId,
                teamName: name,
                owner: "GDPL Admin",
                logo: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&size=150`, 
                totalPurse: defaultPurse,
                remainingBudget: defaultPurse,
                squadCount: 0
            });

            nameInput.value = ""; 
            nameInput.focus(); 
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "Add Team";
            btn.disabled = false;
        }
    }

    // 4. Live Team List loader
    function loadTeams() {
        db.ref("tournaments/" + activeTour + "/teams").on("value", snap => {
            const container = document.getElementById("listContainer");
            container.innerHTML = "";
            const teams = snap.val();
            
            if(!teams) {
                container.innerHTML = "<div style='font-size:12px; color:#999; text-align:center;'>No teams added yet.</div>";
                return;
            }

            const teamArray = Object.keys(teams).map(key => ({ key, ...teams[key] })).reverse();

            teamArray.forEach(t => {
                container.innerHTML += `
                    <div class="team-row">
                        <span>${t.teamName} <small style="color:#27ae60; font-weight:900;">(₹${t.remainingBudget.toLocaleString('en-IN')})</small></span>
                        <span class="delete-btn" onclick="deleteTeam('${t.key}')">Delete</span>
                    </div>
                `;
            });
        });
    }

    // 5. Delete Team
    async function deleteTeam(key) {
        if(confirm("क्या आप पक्का इस टीम को डिलीट करना चाहते हैं?")) {
            await db.ref("tournaments/" + activeTour + "/teams/" + key).remove();
        }
    }
</script>
</body>
</html>
