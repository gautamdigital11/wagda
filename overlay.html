<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: transparent; 
            font-family: 'Poppins', sans-serif; 
            width: 100vw; height: 100vh;
        }

        /* --- 🏆 BIG TOURNAMENT WATERMARK (FIXED) --- */
        .watermark {
            position: absolute; 
            top: 45%; left: 50%; 
            transform: translate(-50%, -50%);
            font-size: 120px; /* एकदम बड़ा साइज़ */
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.8); /* बहुत हल्का ताकि पीछे दिखे */
            text-transform: uppercase; 
            letter-spacing: 15px; 
            z-index: 0; /* सबसे पीछे */
            text-align: center; 
            width: 100%; 
            white-space: nowrap; 
            pointer-events: none;
            line-height: 1;
        }

        /* --- PLAYER BOX (BOTTOM LEFT - JUMBO) --- */
        .player-box-wrapper {
            position: absolute; bottom: 90px; left: 4vw;
            display: flex; align-items: center;
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(11, 19, 43, 0.9) 100%);
            border-bottom: 6px solid #00d2ff; border-radius: 20px;
            padding: 15px 30px 15px 160px; min-width: 550px; height: 150px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 10;
        }

        .p-photo-wrapper {
            position: absolute; left: -20px; bottom: -6px; 
            width: 170px; height: 210px; /* और बड़ी फोटो */
            border-radius: 15px; border: 5px solid #00d2ff; overflow: visible; background: #111;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.5); z-index: 15;
        }
        .p-photo { width: 100%; height: 100%; object-fit: fill; border-radius: 11px; }

        .p-id-batch {
            position: absolute; top: -15px; right: -15px;
            background: linear-gradient(45deg, #f1c40f, #f39c12);
            color: #000; font-weight: 900; font-size: 32px;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 4px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .p-info h2 { margin: 0; color: #00d2ff; font-size: 55px; text-transform: uppercase; font-weight: 900; line-height: 1; }
        .p-info p { margin: 8px 0 0; color: #ffffff; font-size: 26px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* --- BRANDING BOX --- */
        .branding-box-wrapper {
            position: absolute; bottom: 90px; right: 4vw;
            background: linear-gradient(90deg, rgba(11, 19, 43, 0.95) 0%, rgba(5, 10, 24, 0.95) 100%);
            border-right: 6px solid #ff0054; border-radius: 15px; 
            padding: 15px 35px; display: flex; align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10;
        }
        .brand-title { margin: 0; color: #ff0054; font-size: 32px; font-weight: 900; text-transform: uppercase; }
        .brand-subtitle { margin: 0; color: #cbd5e1; font-size: 14px; text-transform: uppercase; font-weight: 700; }

        /* --- CELEBRATION --- */
        #celebrationScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(5, 10, 24, 0.96); z-index: 999; animation: fadeIn 0.4s;
        }
        .status-header { font-size: 160px; font-weight: 900; margin: 0; line-height: 0.8; }
        .celeb-photo { width: 400px; height: 400px; border-radius: 30px; border: 10px solid #fff; margin: 30px 0; object-fit: cover; } 

        /* --- TICKER --- */
        .ticker-wrap { position: fixed; bottom: 0; width: 100vw; height: 65px; background: #ff0054; color: white; display: flex; align-items: center; z-index: 5; font-size: 28px; font-weight: 800; overflow: hidden; border-top: 3px solid #fff; }
        .ticker-content { white-space: nowrap; animation: ticker 25s linear infinite; display: flex; align-items: center; padding-left: 100vw; }
        .ticker-highlight { color: #fbbf24; font-weight: 900; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="watermarkTourName" class="watermark">GDPL 2026</div>

    <div id="celebrationScreen">
        <p id="statusText" class="status-header"></p>
        <img id="celebPhoto" class="celeb-photo" src="">
        <div id="celebMsg" style="font-size:60px; color:white; font-weight:900; text-align:center; text-transform:uppercase;"></div>
    </div>

    <div class="player-box-wrapper" id="playerBox">
        <div class="p-photo-wrapper">
            <div id="overId" class="p-id-batch">0</div>
            <img id="overPhoto" class="p-photo" src="">
        </div>
        <div class="p-info">
            <h2 id="overName">WAITING...</h2>
            <p id="overType">READY FOR ACTION</p>
        </div>
    </div>

    <div class="branding-box-wrapper">
        <div class="branding-content">
            <div class="brand-subtitle">LIVE BROADCAST Partner</div>
            <div class="brand-title">GAUTAM DIGITAL</div>
        </div>
    </div>

    <div class="ticker-wrap"><div id="tickerItems" class="ticker-content">Auction Live Syncing...</div></div>

<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com", 
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    let activeTour = null;
    if (urlParams.get('id')) {
        try { activeTour = atob(urlParams.get('id')); } catch(e) { activeTour = null; }
    } else {
        activeTour = localStorage.getItem("activeTournamentID");
    }

    if (activeTour) startOverlay();

    let isAnimating = false;
    const safeDummy = "https://via.placeholder.com/400x400/0b132b/00d2ff?text=GD";

    function startOverlay() {
        const tourPath = "tournaments/" + activeTour;

        // --- 🏆 TOURNAMENT NAME SETTINGS ---
        db.ref(tourPath + "/config").on("value", snap => {
            if(snap.exists()) {
                const conf = snap.val();
                document.getElementById("watermarkTourName").innerText = conf.tournamentName || activeTour;
            }
        });

        // --- REAL-TIME TICKER ---
        db.ref(tourPath + "/players").on('value', snap => {
            const players = Object.values(snap.val() || {});
            const sold = players.filter(p => p.status === 'sold').slice(-10);
            let tText = `WELCOME TO ${activeTour.toUpperCase()} LIVE AUCTION  ✦  `;
            if (sold.length > 0) {
                tText += sold.map(p => `🏏 ${p.name.toUpperCase()} <span class="ticker-highlight">SOLD TO ${p.soldTo.toUpperCase()}</span> (₹${p.soldPrice.toLocaleString()})`).join("  ✦  ");
            }
            document.getElementById("tickerItems").innerHTML = tText + tText;
        });

        // --- CURRENT PLAYER ---
        db.ref(tourPath + "/live_state/currentPlayer").on('value', snap => {
            const pid = snap.val();
            if (pid && !isAnimating) {
                db.ref(tourPath + "/players/" + pid).once('value', s => {
                    if(s.exists()) updatePlayerBox(s.val());
                });
            } else if (!isAnimating) {
                updatePlayerBox(null);
            }
        });

        // --- TRIGGER ANIMATION ---
        db.ref(tourPath + "/live_state/trigger").on('value', async snap => {
            const data = snap.val();
            if (!data || Date.now() - data.timestamp > 5000) return;
            if (isAnimating) return;

            isAnimating = true;
            const pSnap = await db.ref(tourPath + "/players/" + data.playerId).once('value');
            const p = pSnap.val() || {};

            const screen = document.getElementById("celebrationScreen");
            const status = document.getElementById("statusText");
            const celebPhoto = document.getElementById("celebPhoto");

            celebPhoto.src = p.photo || safeDummy;
            
            if (data.action === "SOLD") {
                status.innerText = "SOLD"; status.style.color = "#27ae60";
                document.getElementById("celebMsg").innerHTML = `${p.name.toUpperCase()}<br><span style="color:#00d2ff">${data.team.toUpperCase()}</span><br><span style="color:#27ae60">₹${data.price.toLocaleString()}</span>`;
                confetti({ particleCount: 600, spread: 160, origin: { y: 0.6 } });
            } else {
                status.innerText = "UNSOLD"; status.style.color = "#ff0054";
                document.getElementById("celebMsg").innerHTML = `${p.name.toUpperCase()}<br><span style="color:#94a3b8">BETTER LUCK NEXT TIME</span>`;
            }

            screen.style.display = "flex";
            setTimeout(() => {
                screen.style.display = "none";
                isAnimating = false;
                location.reload(); 
            }, 6000);
        });
    }

    function updatePlayerBox(p) {
        if(p) {
            document.getElementById("overName").innerText = p.name.toUpperCase();
            document.getElementById("overType").innerText = `${p.type} | BASE: ₹${p.basePrice || 0}`;
            document.getElementById("overPhoto").src = p.photo || safeDummy;
            document.getElementById("overId").innerText = p.regId || "0";
            document.getElementById("overId").style.display = "flex";
        } else {
            document.getElementById("overName").innerText = "WAITING...";
            document.getElementById("overType").innerText = "NEXT PLAYER SOON";
            document.getElementById("overPhoto").src = safeDummy;
            document.getElementById("overId").style.display = "none";
        }
    }
</script>
</body>
</html>
