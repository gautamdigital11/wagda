<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Records & Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        .tour-badge { display: inline-block; background: #f39c12; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }

        .header { text-align: center; border-bottom: 3px solid #0b132b; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #0b132b; text-transform: uppercase; letter-spacing: 1px; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0b132b; color: white; padding: 12px; text-align: left; text-transform: uppercase; font-size: 12px; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        .price-tag { font-weight: 800; color: #27ae60; font-size: 15px; }
        .team-tag { background: #ff0054; color: white; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .mobile-no { font-family: 'Courier New', monospace; font-weight: bold; color: #2c3e50; font-size: 14px; white-space: nowrap; }
        
        .jersey-no { font-weight: 900; color: #ff0054; text-align: center; font-size: 16px; }
        .t-size { font-weight: bold; background: #eee; padding: 3px 8px; border-radius: 4px; font-size: 11px; }

        .btn-home { background: #00d2ff; color: #0b132b; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-right: 10px; font-size: 13px;}
        .print-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; font-size: 13px;}
        
        .loading { text-align: center; padding: 50px; font-size: 16px; color: #666; font-weight: bold; }

        /* Error Box */
        .error-box { display: none; background: #fee2e2; color: #b91c1c; padding: 20px; border-radius: 15px; border: 2px solid #ef4444; font-weight: bold; text-align: center; margin-top: 20px; }

        @media print { 
            .print-btn, .btn-home { display: none; } 
            .container { box-shadow: none; padding: 0; max-width: 100%; border: none; } 
            body { background: white; padding: 0; } 
            th { background: #0b132b !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div>
            <a href="index.html" class="btn-home" id="adminHomeBtn" style="display: none;">🏠 Admin Hub</a>
            <button class="print-btn" onclick="window.print()">🖨️ Print Report</button>
        </div>
        
        <div class="header">
            <div class="tour-badge" id="badgeName">Checking Database...</div>
            <h1 id="listTitle">Loading Records...</h1>
            <p id="subTitle" style="margin:5px 0 0; font-size:12px; font-weight:bold; color:#666;">GAUTAM DIGITAL ENGINE</p>
        </div>

        <div id="errorBox" class="error-box">
            ⚠️ INVALID OR EXPIRED SECURE LINK!<br>Please use the correct link to view reports.
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th style="width: 50px;">S.No</th>
                    <th>Player Name</th>
                    <th>Category</th>
                    <th id="colStatus">Status / Team</th> 
                    <th>Price</th>
                    <th>Jersey Name</th> 
                    <th style="text-align: center;">No.</th> 
                    <th>Size</th> 
                    <th>Mobile Number</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="9" class="loading">Firebase से डेटा सिंक हो रहा है...</td></tr>
            </tbody>
        </table>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com", 
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. 🔓 PUBLIC URL DECODER
    const urlParams = new URLSearchParams(window.location.search);
    let activeTour = null;

    if (urlParams.get('id')) {
        try { 
            activeTour = atob(urlParams.get('id')); 
        } catch(e) { 
            activeTour = null; 
        }
    } else {
        activeTour = localStorage.getItem("activeTournamentID");
        if (localStorage.getItem("isLoggedIn") === "true") {
            document.getElementById("adminHomeBtn").style.display = "inline-block";
        }
    }

    if (!activeTour) {
        document.getElementById("dataTable").style.display = "none";
        document.getElementById("errorBox").style.display = "block";
        document.getElementById("badgeName").innerText = "LOCKED";
        document.getElementById("listTitle").innerText = "ACCESS DENIED";
    } else {
        document.getElementById("badgeName").innerText = "🏆 " + activeTour + " DATABASE";
        renderList();
    }

    // 3. Render List Logic
    function renderList() {
        const tbody = document.getElementById("tableBody");
        const type = urlParams.get('type'); 
        const teamName = urlParams.get('name'); // Agar 'TEAM' type hai tab

        db.ref("tournaments/" + activeTour + "/players").once('value', (snapshot) => {
            const playersData = snapshot.val();
            if (!playersData) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding: 40px; font-weight:bold;">डेटा उपलब्ध नहीं है।</td></tr>`;
                return;
            }

            let players = Object.keys(playersData).map(key => ({
                id: key,
                ...playersData[key]
            }));

            let finalData = [];
            let title = "Report";

            // Filtering Logic based on URL 'type' parameter
            if (type === 'TOTAL') { 
                title = "All Registered Players"; 
                finalData = players; 
            } 
            else if (type === 'SOLD_ALL') { 
                title = "Official Sold Players List"; 
                finalData = players.filter(p => p.status === "sold"); 
            } 
            else if (type === 'UNSOLD') { 
                title = "Unsold Players Report"; 
                finalData = players.filter(p => p.status === "unsold"); 
            } 
            else if (type === 'PENDING') { 
                title = "Available Players"; 
                finalData = players.filter(p => p.status === "available"); 
            } 
            else if (type === 'TEAM' && teamName) {
                title = teamName.toUpperCase() + " Official Squad";
                finalData = players.filter(p => p.soldTo && p.soldTo.trim().toLowerCase() === teamName.trim().toLowerCase());
                // Hide Status column if viewing specific team squad
                document.getElementById("colStatus").style.display = "none";
            } else {
                title = "Custom Report";
                finalData = players;
            }

            document.getElementById("listTitle").innerText = title;
            
            if (finalData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:50px; font-weight:bold; color:#ef4444;">कोई रिकॉर्ड नहीं मिला।</td></tr>`;
                return;
            }

            // HTML Generation
            let rowsHtml = "";
            finalData.forEach((p, i) => {
                
                const priceLabel = (p.status === "sold") ? "₹" + parseInt(p.soldPrice || 0).toLocaleString('en-IN') : "-";
                
                let statusTd = "";
                if (type !== 'TEAM') {
                    const teamInfo = p.soldTo || p.status || "AVAILABLE";
                    const badgeClass = (p.status === "sold") ? "team-tag" : "";
                    statusTd = `<td><span class="${badgeClass}">${teamInfo.toUpperCase()}</span></td>`;
                }

                const pName = (p.name || "Unknown").toString().toUpperCase();
                const pType = (p.type || "All-Rounder").toString();
                const pMob  = (p.mobile || "-").toString();
                const jName = (p.printName || p.name || "-").toString().toUpperCase();
                const jNum  = (p.jerseyNo || "-").toString();
                const tSize = (p.jerseySize || "-").toString().toUpperCase();

                rowsHtml += `
                <tr>
                    <td>${i + 1}</td>
                    <td><b>${pName}</b></td>
                    <td>${pType}</td>
                    ${statusTd}
                    <td class="price-tag">${priceLabel}</td>
                    <td>${jName}</td>
                    <td class="jersey-no">${jNum}</td>
                    <td><span class="t-size">${tSize}</span></td>
                    <td class="mobile-no">${pMob}</td>
                </tr>
                `;
            });

            tbody.innerHTML = rowsHtml;
        });
    }
</script>
</body>
</html>
