<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0b132b; 
            --accent: #00a8ff; 
            --success: #27ae60; 
            --danger: #ef4444; 
            --bg: #f4f7f6; 
        }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }

        .header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 20px; margin-bottom: 30px; position: relative; }
        .header h1 { margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        
        .tour-badge { display: inline-block; background: var(--primary); color: white; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }

        .db-status { position: absolute; top: 0; right: 0; font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: bold; background: #eee; }
        .db-status.online { background: #d1fae5; color: #047857; }
        .db-status.offline { background: #fee2e2; color: #b91c1c; }

        .controls { display: flex; justify-content: center; margin-bottom: 30px; }
        #playerSearch { padding: 12px 25px; width: 100%; max-width: 400px; border-radius: 50px; border: 2px solid #ddd; font-size: 16px; outline: none; transition: 0.3s; font-family: 'Poppins'; }
        #playerSearch:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 168, 255, 0.2); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        
        .player-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; position: relative; }
        .player-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: var(--accent); }
        
        .id-badge { position: absolute; top: 15px; left: 15px; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 900; color: var(--primary); }

        .photo-frame { width: 120px; height: 120px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, var(--accent), var(--primary)); margin: 0 auto 15px; overflow: hidden; }
        .player-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
        
        .p-name { font-size: 18px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; }
        .p-type { font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; background: #f1f5f9; display: inline-block; padding: 4px 10px; border-radius: 6px; }
        
        .status-badge { display: block; margin: 15px auto; padding: 6px; border-radius: 8px; font-size: 11px; font-weight: 800; color: white; text-transform: uppercase; width: 80%; letter-spacing: 1px; }
        .bg-sold { background: var(--success); }
        .bg-unsold { background: var(--danger); }
        .bg-available { background: #94a3b8; }

        .contact-info { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 15px; text-align: left; }
        .contact-info div { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .contact-info b { color: var(--primary); }

        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-home { background: var(--accent); color: var(--primary); display: none; /* Only show for admins */ }
        .btn-print { background: var(--primary); }

        .loading-text { text-align: center; font-size: 16px; font-weight: bold; color: #94a3b8; width: 100%; grid-column: 1 / -1; }

        /* Error Message Box */
        .error-box { display: none; background: #fee2e2; color: #b91c1c; padding: 20px; border-radius: 15px; border: 2px solid #ef4444; font-weight: bold; margin-bottom: 20px; text-align: center; }

        /* Print Settings */
        @media print { 
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; border: none; }
            .nav-btns, .controls, .db-status, .error-box { display: none; } 
            .player-card { page-break-inside: avoid; border: 1px solid #ddd; }
        }

        /* Mobile Settings */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .header h1 { font-size: 22px; }
            .db-status { position: static; display: inline-block; margin-top: 10px; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="nav-btns">
                <a href="index.html" class="btn btn-home" id="adminHomeBtn">🏠 Admin Hub</a>
                <button class="btn btn-print" onclick="window.print()">🖨️ Print Gallery</button>
            </div>
            
            <h1 id="pageTitle">PLAYER GALLERY</h1>
            <div class="tour-badge" id="activeBadge">🏆 Checking Tournament...</div>
            
            <div id="dbStatus" class="db-status">🟡 CONNECTING...</div>
        </div>

        <div id="errorBox" class="error-box">
            ⚠️ INVALID LINK OR EXPIRED TOURNAMENT!<br>Please contact the organizer for the correct Gallery Link.
        </div>

        <div id="mainUI">
            <div class="controls">
                <input type="text" id="playerSearch" placeholder="🔍 Search player by name..." onkeyup="filterCards()">
            </div>

            <div id="galleryGrid" class="gallery-grid">
                <div class="loading-text">Loading player database...</div>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
        authDomain: "auction-39d98.firebaseapp.com",
        databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com", 
        projectId: "auction-39d98",
        storageBucket: "auction-39d98.firebasestorage.app",
        messagingSenderId: "278392876249",
        appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. 🔓 PUBLIC URL DECODER (लॉगिन चेक नहीं है, सिर्फ लिंक चेक करेगा)
    const urlParams = new URLSearchParams(window.location.search);
    let activeTour = null;

    if (urlParams.get('id')) {
        try { 
            activeTour = atob(urlParams.get('id')); 
        } catch(e) { 
            activeTour = null; 
        }
    } else {
        // If an Admin opens it directly from their dashboard
        activeTour = localStorage.getItem("activeTournamentID");
        // Show Admin Hub button if they are logged in
        if (localStorage.getItem("isLoggedIn") === "true") {
            document.getElementById("adminHomeBtn").style.display = "inline-block";
        }
    }

    const grid = document.getElementById("galleryGrid");

    if (!activeTour) {
        document.getElementById("activeBadge").innerText = "SYSTEM LOCKED";
        document.getElementById("activeBadge").style.background = "var(--danger)";
        document.getElementById("mainUI").style.display = "none";
        document.getElementById("errorBox").style.display = "block";
    } else {
        document.getElementById("activeBadge").innerText = "🏆 TOURNAMENT: " + activeTour;
        document.getElementById("pageTitle").innerText = activeTour + " GALLERY";
        startDatabase();
    }

    function startDatabase() {
        // Connection Tracking
        db.ref('.info/connected').on('value', snap => {
            const status = document.getElementById("dbStatus");
            if (snap.val() === true) {
                status.innerText = "🟢 CONNECTED";
                status.className = "db-status online";
            } else {
                status.innerText = "🔴 OFFLINE";
                status.className = "db-status offline";
            }
        });

        // 3. Load Data from Specific Tournament
        db.ref("tournaments/" + activeTour + "/players").on("value", snap => {
            const players = snap.val();
            grid.innerHTML = "";
            
            if (!players) {
                grid.innerHTML = "<div class='loading-text'>No players registered yet.</div>";
                return;
            }

            // Convert Object to Array and Sort by ID
            let playerArray = Object.keys(players).map(k => ({ key: k, ...players[k] }));
            playerArray.sort((a, b) => parseInt(a.regId || 0) - parseInt(b.regId || 0));

            playerArray.forEach(p => {
                const status = (p.status || 'available').toUpperCase();
                
                let statusClass = 'bg-available';
                if (status === 'SOLD') statusClass = 'bg-sold';
                if (status === 'UNSOLD') statusClass = 'bg-unsold';
                
                let statusText = status === 'SOLD' ? `SOLD TO ${p.soldTo}` : status;
                let photoSrc = p.photo || "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png";

                const card = document.createElement("div");
                card.className = "player-card";
                card.innerHTML = `
                    <div class="id-badge">#${p.regId || '-'}</div>
                    <div class="photo-frame">
                        <img class="player-photo" src="${photoSrc}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png'">
                    </div>
                    <div class="p-name">${p.name || 'Unknown'}</div>
                    <div class="p-type">${p.type || '-'}</div>
                    
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    
                    <div class="contact-info">
                        <div>📞 <b>${p.mobile || 'Not provided'}</b></div>
                        <div>📍 <b>${p.address || 'Local'}</b></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }

    // 4. Search Filter
    function filterCards() {
        let val = document.getElementById('playerSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('player-card');
        for (let card of cards) {
            let name = card.querySelector('.p-name').innerText.toLowerCase();
            card.style.display = name.includes(val) ? "block" : "none";
        }
    }
</script>
</body>
</html>
