<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUCTION CANTROL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0b132b; --accent: #38bdf8; --success: #10b981; 
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --card: #ffffff;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; padding-bottom: 50px; display: none; }
        
        .nav-bar { background: var(--primary); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .back-btn { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 12px; background: white; padding: 6px 12px; border-radius: 6px; text-transform: uppercase; }
        .brand-title { font-weight: 900; color: #6fffe9; letter-spacing: 1px; font-size: 16px; text-transform: uppercase; }
        .db-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; background: #f59e0b; color: white; }
        .db-status.online { background: #10b981; } .db-status.offline { background: #ef4444; animation: blink 1s infinite; }

        .tour-banner { background: var(--warning); color: #000; text-align: center; padding: 6px; font-size: 13px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        .stats-strip { display: flex; justify-content: center; gap: 10px; padding: 15px 10px; background: white; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
        .stat-badge { padding: 8px 15px; border-radius: 10px; font-size: 13px; font-weight: 800; display: flex; flex-direction: column; align-items: center; min-width: 110px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-badge span { font-size: 11px; font-weight: 800; text-transform: uppercase; opacity: 0.8; }
        .bg-blue { background: #e0f2fe; color: #0369a1; } .bg-green { background: #dcfce7; color: #047857; } .bg-red { background: #fee2e2; color: #b91c1c; }

        /* 📱 RESPONSIVE LAYOUT */
        .main-wrapper { display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        @media (min-width: 992px) { 
            .main-wrapper { flex-direction: row; align-items: flex-start; } 
            .left-panel { flex: 0 0 450px; position: sticky; top: 100px; } 
            .right-panel { flex: 1; } 
        }

        .auction-card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); text-align: center; position: relative; }
        
        /* Search Box */
        .manual-search { display: flex; gap: 10px; margin-bottom: 25px; background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px dashed #cbd5e1; }
        .manual-search input { flex: 1; padding: 12px; font-size: 14px; border: 2px solid #e2e8f0; outline: none; border-radius: 8px; font-weight: 600; }
        .manual-search button { background: var(--primary); color: white; padding: 12px 15px; font-size: 13px; border-radius: 8px; white-space: nowrap; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; }

        .photo-container { position: relative; width: 160px; height: 160px; margin: 0 auto 15px; }
        #playerPhoto { width: 100%; height: 100%; border-radius: 15px; border: 4px solid var(--primary); object-fit: contain; background: #e2e8f0; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .live-badge { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); background: #ff0054; color: white; padding: 5px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; animation: blink 1s infinite; white-space: nowrap; }
        .id-badge { position: absolute; top: -10px; right: -15px; background: var(--warning); color: #000; font-size: 16px; font-weight: 900; padding: 6px 15px; border-radius: 30px; border: 3px solid white; z-index: 10; }
        
        #playerName { margin: 10px 0 5px; font-size: 26px; font-weight: 900; color: var(--primary); text-transform: uppercase; line-height: 1.1; }
        #playerType { margin: 0 0 20px; font-size: 12px; color: #1e293b; font-weight: 800; background: #f1f5f9; display: inline-block; padding: 6px 15px; border-radius: 50px; text-transform: uppercase; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; }
        input[type="number"], select { padding: 16px; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 16px; width: 100%; outline: none; font-family: 'Poppins', sans-serif; font-weight: 700; color: var(--primary); }
        input:focus, select:focus { border-color: var(--accent); }
        
        .selected-team-info { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 10px; padding: 12px; display: none; justify-content: space-between; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .selected-team-info.active { display: flex; }
        .selected-team-info .purse { color: var(--success); font-size: 14px;} .selected-team-info .max { color: var(--danger); font-size: 14px;}

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        button { padding: 16px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.2s; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        button:active { transform: scale(0.95); } button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-sold { background: var(--success); color: white; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-unsold { background: var(--danger); color: white; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }
        
        .utility-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-undo { background: #e2e8f0; color: #475569; font-size: 12px; padding: 12px; }
        .btn-reset { background: #fee2e2; color: #991b1b; font-size: 12px; padding: 12px; }

        /* Teams Section */
        .teams-header { font-size: 18px; font-weight: 900; color: var(--primary); margin: 0 0 15px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; text-transform: uppercase; }
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .team-box { background: white; padding: 18px; border-radius: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 8px; }
        .t-name { font-weight: 900; font-size: 16px; color: var(--primary); text-transform: uppercase; }
        .t-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .t-val.purse { color: var(--success); font-size: 15px; font-weight: 900; } .t-val.max { color: var(--danger); font-weight: 900; }

        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 50; border-radius: 20px; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 16px; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }

        /* 📱 MOBILE FIXES */
        @media (max-width: 600px) {
            .btn-row { grid-template-columns: 1fr; }
            .utility-btns { grid-template-columns: 1fr 1fr; }
            .nav-bar { padding: 10px; }
            #playerName { font-size: 22px; }
        }

        @keyframes blink { 50% { opacity: 0.5; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">🔙 HUB</a>
        <div id="dbStatus" class="db-status">🟡 CONNECTING...</div>
        <div class="brand-title">⚙️ CONTROL DESK</div>
    </div>
    <div class="tour-banner" id="tourBanner">Loading...</div>

    <div class="stats-strip">
        <div class="stat-badge bg-blue"><span>Available</span><div id="countAvail" style="font-size: 22px;">--</div></div>
        <div class="stat-badge bg-green"><span>Sold</span><div id="countSold" style="font-size: 22px;">--</div></div>
        <div class="stat-badge bg-red"><span>Unsold</span><div id="countUnsold" style="font-size: 22px;">--</div></div>
    </div>
    
    <div class="main-wrapper">
        <div class="left-panel">
            <div class="auction-card">
                <div id="loader" class="loader-overlay"><div class="spinner"></div><div>Syncing Data...</div></div>

                <div class="manual-search">
                    <input type="number" id="searchPlayerId" placeholder="🔍 Enter Player ID (e.g. 7)" autocomplete="off">
                    <button onclick="searchPlayerById()">PULL ⚡</button>
                </div>

                <div class="photo-container">
                    <div class="id-badge" id="playerIdBadge">#--</div>
                    <img id="playerPhoto" src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" alt="Player">
                    <div class="live-badge" id="liveBadge">PAUSED</div>
                </div>
                
                <h2 id="playerName">WAITING TO START...</h2>
                <p id="playerType">Fetching Next Player...</p>
                
                <div class="controls">
                    <input type="number" id="price" placeholder="💰 Sold Price (₹)">
                    <select id="teamSelect" onchange="updateLimitUI()">
                        <option value="">-- Assign Team --</option>
                    </select>
                    
                    <div id="selectedTeamAlert" class="selected-team-info">
                        <div>Purse: <span class="purse" id="alertPurse">₹0</span></div>
                        <div>Max Bid: <span class="max" id="alertMax">₹0</span></div>
                    </div>
                    
                    <div class="btn-row">
                        <button id="btnSold" class="btn-sold" onclick="process('SOLD')">🔨 SOLD</button>
                        <button id="btnUnsold" class="btn-unsold" onclick="process('UNSOLD')">❌ UNSOLD</button>
                    </div>
                    
                    <div class="utility-btns">
                        <button class="btn-undo" onclick="process('UNDO')">↩️ UNDO LAST</button>
                        <button class="btn-reset" onclick="confirmReset()">🔄 RESET UNSOLD</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h3 class="teams-header" id="teamsHeader">📊 Teams Overview</h3>
            <div id="teamsDisplay" class="teams-grid"></div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>

<script>
    // --- SECURITY CHECK ---
    const authStatus = localStorage.getItem("isLoggedIn");
    const activeTour = localStorage.getItem("activeTournamentID");
    if (authStatus !== "true" || !activeTour) window.location.replace("login.html");
    else document.body.style.display = "block";

    // 1. Firebase Setup
    const firebaseConfig = {
      apiKey: "AIzaSyAhGvK-ZMH721sHcuHsWjpZAxPTI5ulLsU",
      authDomain: "auction-39d98.firebaseapp.com",
      databaseURL: "https://auction-39d98-default-rtdb.firebaseio.com", 
      projectId: "auction-39d98",
      storageBucket: "auction-39d98.firebasestorage.app",
      messagingSenderId: "278392876249",
      appId: "1:278392876249:web:fe1c0167b368f3f91ba2c8"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tourConfig = { squadLimit: 15, defaultBasePrice: 1000 }; 
    let teamsData = {}, playersData = {};
    let activePlayerId = null, lastAction = null; 

    const safeDummy = "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png";

    document.getElementById("tourBanner").innerText = "🏆 ACTIVE TOURNAMENT: " + activeTour;
    document.getElementById("teamsHeader").innerText = "📊 " + activeTour + " Teams Dashboard";
    
    db.ref("tournaments/" + activeTour + "/config").once("value", snap => {
        if(snap.exists()){
            const config = snap.val();
            tourConfig.squadLimit = config.squadLimit || 15;
            tourConfig.defaultBasePrice = config.defaultBasePrice || 1000;
        }
        startListeners(); 
    });

    function disableAllControls() {
        document.getElementById("btnSold").disabled = true;
        document.getElementById("btnUnsold").disabled = true;
        document.getElementById("price").disabled = true;
        document.getElementById("teamSelect").disabled = true;
    }

    function startListeners() {
        db.ref('.info/connected').on('value', snap => {
            const s = document.getElementById("dbStatus");
            if (snap.val() === true) { s.innerText = "🟢 DB CONNECTED"; s.className = "db-status online"; } 
            else { s.innerText = "🔴 OFFLINE"; s.className = "db-status offline"; }
        });

        db.ref("tournaments/" + activeTour).on('value', snap => {
            const data = snap.val() || {};
            teamsData = data.teams || {};
            playersData = data.players || {};
            activePlayerId = data.live_state ? data.live_state.currentPlayer : null;

            // 🟢 THE MAGIC: AUTO-NEXT RANDOM PLAYER LOGIC
            if (!activePlayerId) {
                const pArray = Object.keys(playersData).map(k => ({ key: k, ...playersData[k] }));
                const avail = pArray.filter(p => p.status === 'available' && p.paymentStatus !== 'pending');
                
                if (avail.length > 0) {
                    // अब यह हमेशा एक रैंडम (Random) खिलाड़ी चुनेगा
                    const randomIndex = Math.floor(Math.random() * avail.length);
                    db.ref("tournaments/" + activeTour + "/live_state/currentPlayer").set(avail[randomIndex].key);
                    return; // DB में सेट किया है, तो दुबारा रीलोड होने का इंतज़ार करें
                }
            }

            renderUI();
        });
    }

    // 🔍 MANUAL SEARCH PLAYER BY ID
    function searchPlayerById() {
        const searchId = document.getElementById("searchPlayerId").value.trim();
        if(!searchId) return alert("⚠️ Player ID डालें!");

        let foundKey = null, pData = null;

        for(let key in playersData) {
            if(parseInt(playersData[key].regId) === parseInt(searchId)) {
                foundKey = key; pData = playersData[key]; break;
            }
        }

        if(!foundKey) return alert("❌ Player ID #" + searchId + " नहीं मिला!");
        if(pData.status === 'sold') return alert("⚠️ Player ID #" + searchId + " पहले ही बिक चुका है!");
        
        if(pData.paymentStatus === 'pending') {
            alert("⚠️ Alert: इस प्लेयर का पेमेंट वेरीफाई नहीं हुआ है!\nकृपया पहले 'Verify Payments' पैनल में जाकर इसे Approve करें।");
            return;
        }

        db.ref("tournaments/" + activeTour + "/live_state/currentPlayer").set(foundKey);
        document.getElementById("searchPlayerId").value = ""; 
    }

    document.getElementById("searchPlayerId").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); searchPlayerById(); }
    });

    // 🖥️ RENDER UI FUNCTION
    function renderUI() {
        const pArray = Object.keys(playersData).map(k => ({ key: k, ...playersData[k] }));
        const tArray = Object.keys(teamsData).map(k => ({ key: k, ...teamsData[k] }));

        const avail = pArray.filter(p => p.status === 'available' && p.paymentStatus !== 'pending');
        const sold = pArray.filter(p => p.status === 'sold');
        const unsold = pArray.filter(p => p.status === 'unsold');

        document.getElementById("countAvail").innerText = avail.length;
        document.getElementById("countSold").innerText = sold.length;
        document.getElementById("countUnsold").innerText = unsold.length;

        // LOAD THE ACTIVE PLAYER
        if (activePlayerId && playersData[activePlayerId] && playersData[activePlayerId].status === 'available') {
            const p = playersData[activePlayerId];
            document.getElementById("playerIdBadge").innerText = "#" + (p.regId || '--');
            document.getElementById("playerName").innerText = (p.name || "Unknown").toUpperCase();
            document.getElementById("playerType").innerText = `${p.type || "Player"} | Base: ₹${p.basePrice || tourConfig.defaultBasePrice}`;
            document.getElementById("playerPhoto").src = p.photo && p.photo !== "" ? p.photo : safeDummy;
            document.getElementById("price").value = p.basePrice || tourConfig.defaultBasePrice;
            
            document.getElementById("liveBadge").innerText = "🔴 LIVE ON SCREENS";
            document.getElementById("liveBadge").style.background = "#ff0054";
            
            document.getElementById("btnSold").disabled = false;
            document.getElementById("btnUnsold").disabled = false;
            document.getElementById("price").disabled = false;
            document.getElementById("teamSelect").disabled = false;
        } else {
            document.getElementById("playerIdBadge").innerText = "#--";
            document.getElementById("playerName").innerText = "AUCTION OVER";
            document.getElementById("playerType").innerText = "All Verified Players are Sold or Unsold";
            document.getElementById("playerPhoto").src = safeDummy;
            document.getElementById("price").value = "";
            
            document.getElementById("liveBadge").innerText = "⏸ PAUSED";
            document.getElementById("liveBadge").style.background = "#64748b";
            
            document.getElementById("btnSold").disabled = true;
            document.getElementById("btnUnsold").disabled = true;
            document.getElementById("price").disabled = true;
            document.getElementById("teamSelect").disabled = true;
        }

        // LOAD TEAMS & PURSE CALCULATION
        const select = document.getElementById("teamSelect");
        const display = document.getElementById("teamsDisplay");
        const currentSelection = select.value; 
        
        select.innerHTML = '<option value="">-- Assign Team --</option>';
        display.innerHTML = "";

        tArray.forEach(t => {
            const squadCount = sold.filter(p => p.soldTo === t.teamName).length;
            const balance = parseInt(t.remainingBudget || 0);
            
            let maxBid = balance;
            if (squadCount < tourConfig.squadLimit) {
                const emptySlots = tourConfig.squadLimit - squadCount - 1; 
                maxBid = balance - (emptySlots * tourConfig.defaultBasePrice);
            }
            if(maxBid < 0) maxBid = 0;

            const opt = document.createElement('option');
            opt.value = t.key; opt.innerText = t.teamName;
            opt.dataset.max = maxBid; opt.dataset.purse = balance;
            select.appendChild(opt);

            display.innerHTML += `
                <div class="team-box">
                    <div class="t-name">${t.teamName}</div>
                    <div class="t-row" style="margin-top:8px;"><span>Squad Filled</span> <span style="font-weight:900; color:#0f172a;">${squadCount}/${tourConfig.squadLimit}</span></div>
                    <div class="t-row"><span>Remaining Purse</span> <span class="t-val purse">₹${balance.toLocaleString('en-IN')}</span></div>
                    <div class="t-row"><span>Max Bid allowed</span> <span class="t-val max">₹${maxBid.toLocaleString('en-IN')}</span></div>
                </div>`;
        });
        select.value = currentSelection;
        updateLimitUI();
    }

    function updateLimitUI() {
        const select = document.getElementById("teamSelect");
        const alertBox = document.getElementById("selectedTeamAlert");
        if (select.value) {
            const opt = select.options[select.selectedIndex];
            document.getElementById("alertPurse").innerText = "₹" + parseInt(opt.dataset.purse).toLocaleString('en-IN');
            document.getElementById("alertMax").innerText = "₹" + parseInt(opt.dataset.max).toLocaleString('en-IN');
            alertBox.classList.add("active");
        } else { alertBox.classList.remove("active"); }
    }

    function showLoader(show) { document.getElementById("loader").style.display = show ? "flex" : "none"; }

    function confirmReset() {
        if(confirm("Are you sure you want to reset ALL UNSOLD players back to available?")) { process('RESET_UNSOLD'); }
    }

    // 🔨 PROCESS AUCTION (SOLD / UNSOLD)
    async function process(actionType) {
        showLoader(true);
        const tourPath = "tournaments/" + activeTour;
        
        try {
            if (actionType === 'SOLD' || actionType === 'UNSOLD') {
                if (!activePlayerId) { showLoader(false); return; }
                
                let teamKey = "", teamName = "", price = 0;

                if (actionType === 'SOLD') {
                    teamKey = document.getElementById("teamSelect").value;
                    price = parseInt(document.getElementById("price").value);
                    if (!teamKey || isNaN(price)) { alert("⚠️ Team and Price required!"); showLoader(false); return; }
                    
                    const t = teamsData[teamKey];
                    const selectedOpt = document.getElementById("teamSelect").options[document.getElementById("teamSelect").selectedIndex];
                    
                    if (price > parseInt(selectedOpt.dataset.max)) { 
                        alert("❌ Budget Limit Crossed! Check max bid."); showLoader(false); return; 
                    }
                    teamName = t.teamName;
                    
                    await db.ref(tourPath + "/players/" + activePlayerId).update({ status: "sold", soldTo: teamName, soldPrice: price });
                    await db.ref(tourPath + "/teams/" + teamKey).update({ remainingBudget: t.remainingBudget - price });
                } else {
                    await db.ref(tourPath + "/players/" + activePlayerId).update({ status: "unsold" });
                }

                // 🌟 ANIMATION TRIGGER FOR SCREENS 🌟
                await db.ref(tourPath + "/live_state/trigger").set({
                    action: actionType, playerId: activePlayerId, team: teamName, price: price, timestamp: Date.now() 
                });
                
                lastAction = { type: actionType.toLowerCase(), pKey: activePlayerId, tKey: teamKey, price: price };
                document.getElementById("price").value = "";
                document.getElementById("teamSelect").value = "";

                // 🟢 REMOVE CURRENT PLAYER (Auto-Random logic will trigger automatically)
                await db.ref(tourPath + "/live_state/currentPlayer").remove();

            } else if (actionType === 'UNDO') {
                if (!lastAction) { alert("No action to undo!"); showLoader(false); return; }
                if (lastAction.type === 'sold') {
                    const teamCurrent = teamsData[lastAction.tKey].remainingBudget;
                    await db.ref(tourPath + "/teams/" + lastAction.tKey).update({ remainingBudget: teamCurrent + lastAction.price });
                }
                await db.ref(tourPath + "/players/" + lastAction.pKey).update({ status: "available", soldTo: "None", soldPrice: 0 });
                
                // 🟢 UNDO करने पर वही खिलाड़ी वापस स्क्रीन पर आ जाए
                await db.ref(tourPath + "/live_state/currentPlayer").set(lastAction.pKey);
                
                lastAction = null; alert("✅ Undo Successful!");

            } else if (actionType === 'RESET_UNSOLD') {
                const updates = {};
                for (let key in playersData) { 
                    if (playersData[key].status === 'unsold') updates[`${key}/status`] = 'available'; 
                }
                if (Object.keys(updates).length > 0) { 
                    await db.ref(tourPath + "/players").update(updates); 
                    alert("✅ All unsold players are available again!"); 
                }
            }
        } catch (error) { console.error(error); alert("Network error!"); }
        showLoader(false);
    }
</script>
</body>
</html>
